<!DOCTYPE html>

<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Markdown Test</title>
    <link rel="stylesheet" href="./index.css">
</head>

<body>
    <main>
        <section class="section-0">
            <div class="header">
                <h2>Editor</h2>
            </div>
            <textarea id="editor" spellcheck="false"></textarea>
        </section>
        <section class="section-1">
            <div class="header">
                <h2>Preview</h2>
            </div>
            <div id="preview"></div>
        </section>
        <section class="section-2">
            <div class="header">
                <h2>Preview - Abstract Syntax Tree</h2>
            </div>
            <pre><div id="preview-ast"></div></pre>
        </section>
        <section class="section-3">
            <div class="header">
                <h2>Preview - Token</h2>
            </div>
            <pre><div id="preview-token"></div></pre>
        </section>
        <section class="section-4">
            <div class="header">
                <h2>Preview - HTML</h2>
            </div>
            <pre><div id="preview-html"></div></pre>
        </section>
    </main>
    <script type="module" src="./index.js"></script>
</body>

</html>
