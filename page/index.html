<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/assets/css/layout.css" />
  <link rel="stylesheet" href="/assets/css/markdown.css" />
  <title>Mini Markdown Editor</title>
</head>

<body>
  <div class="page">
    <div class="header">
      <h1>Mini Markdown Editor</h1>
    </div>
    <main class="main">
      <div class="view editor">
        <div class="tab-list">
          <div class="tab-button">Markdown</div>
        </div>
        <div class="tab-panel on">
          <textarea id="editor" class="scroll-text"></textarea>
        </div>
      </div>
      <div class="view output">
        <div class="tab-list">
          <div class="tab-button" data-tab="tab1">Preview</div>
          <div class="tab-button" data-tab="tab2">HTML</div>
          <div class="tab-button" data-tab="tab3">AST</div>
        </div>
        <div id="tab1" class="tab-panel">
          <div id="output-preview" class="scroll-text markdown-body"></div>
        </div>
        <div id="tab2" class="tab-panel">
          <div id="output-html" class="scroll-text"></div>
        </div>
        <div id="tab3" class="tab-panel">
          <div id="output-ast" class="scroll-text"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const tabButtons = document.querySelectorAll(".output .tab-button");
    const tabPanels = document.querySelectorAll(".output .tab-panel");
    const defaultTab = "tab1";
    openTab(defaultTab);
    function openTab(tabName) {
      tabButtons.forEach(elem => elem.classList.remove("on"));
      tabPanels.forEach(elem => elem.classList.remove("on"));
      document.getElementById(tabName).classList.add('on');
      document
        .querySelector('.output .tab-button[data-tab="' + tabName + '"]')
        .classList.add('on');
    }
    tabButtons.forEach(elem => {
      elem.addEventListener("click", () => {
        openTab(elem.dataset.tab);
      });
    });
  </script>

  <script type="module">
    import MiniMarkdown from "/assets/js/mini-markdown.js";
    const markdown = new MiniMarkdown();

    async function readFile(path) {
      const res = await fetch(path);
      const text = await res.text();
      console.log(text);
      return text;
    }
    async function init() {
      var text = await readFile("/assets/input.md");

      const editor = document.getElementById("editor");
      const outputPreview = document.getElementById("output-preview");
      const outputHtml = document.getElementById("output-html");
      const outputAst = document.getElementById("output-ast");

      editor.value = text;
      const ast = markdown.parse(text);
      const html = markdown.render(ast);
      outputPreview.innerHTML = html;
      outputHtml.innerText = html;
      outputAst.innerText = ast.dumpString();
    }

    const editor = document.getElementById("editor");
    const outputPreview = document.getElementById("output-preview");
    const outputHtml = document.getElementById("output-html");
    const outputAst = document.getElementById("output-ast");

    function debounce(fn, delay) {
      let timer = null;
      return function (...args) {
        clearTimeout(timer);
        timer = setTimeout(() => {
          fn.apply(this, args);
        }, delay);
      };
    }

    editor.addEventListener("input", debounce((e) => {
      const text = e.target.value;
      const ast = markdown.parse(text);
      const html = markdown.render(ast);
      outputPreview.innerHTML = html;
      outputHtml.innerText = html;
      outputAst.innerText = ast.dumpString();
    }, 200));

    init();
  </script>
</body>

</html>
