<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="./assets/css/layout.css" />
  <title>Mini Markdown Editor</title>
</head>

<body>
  <div class="page">
    <div class="header">
      <h2>Mini Markdown Editor</h2>
    </div>
    <main class="main">
      <div class="view editor">
        <div class="tab-list">
          <div class="tab-button" data-tab="editor-tab1">Markdown</div>
          <div class="tab-button" data-tab="editor-tab2">Assets</div>
        </div>
        <div id="editor-tab1" class="tab-panel on">
          <textarea id="editor" class="scroll-text"
            onkeydown="if(event.keyCode===9){var v=this.value,s=this.selectionStart,e=this.selectionEnd;this.value=v.substring(0, s)+'  '+v.substring(e);this.selectionStart=this.selectionEnd=s+2;return false;}"></textarea>
        </div>
        <div id="editor-tab2" class="tab-panel">
          <div id="mini-asset-manager"></div>
        </div>
      </div>
      <div class="view output">
        <div class="tab-list">
          <div class="tab-button" data-tab="output-tab1">Preview</div>
          <div class="tab-button" data-tab="output-tab2">HTML</div>
          <div class="tab-button" data-tab="output-tab3">AST</div>
        </div>
        <div id="output-tab1" class="tab-panel">
          <div id="output-preview" class="scroll-text"></div>
        </div>
        <div id="output-tab2" class="tab-panel">
          <div id="output-html" class="scroll-text"></div>
        </div>
        <div id="output-tab3" class="tab-panel">
          <div id="output-ast" class="scroll-text"></div>
        </div>
      </div>
    </main>
  </div>
  <!-- Mini Markdown Editor Scripts -->
  <script type="module">
    // Import components
    import MiniMarkdown from "./components/mini-markdown/mmd.js";
    import MiniHighlighter from "./components/mini-highlighter/mhl.js";
    import MiniAssetManager from "./components/mini-asset-manager/mam.js";
    // Initialize components
    const mmd = new MiniMarkdown();
    const mhl = new MiniHighlighter();
    const mam = new MiniAssetManager();
    const mmdElem = document.getElementById("output-preview");
    await mmd.mount(mmdElem);
    const mhlElem = document.getElementById("output-preview");
    await mhl.mount(mhlElem);
    const mamElem = document.getElementById("mini-asset-manager");
    await mam.mount(mamElem);
    // Get DOM elements
    const editor = document.getElementById("editor");
    const outputPreview = document.getElementById("output-preview");
    const outputHtml = document.getElementById("output-html");
    const outputAst = document.getElementById("output-ast");

    async function readFile(path) {
      const res = await fetch(path);
      const text = await res.text();
      console.log(text);
      return text;
    }

    async function init() {
      var text = await readFile("./assets/input.md");
      editor.value = text;
      const ast = mmd.parse(text);
      const astText = mmd.renderAst(ast);
      const htmlText = mmd.renderHtml(ast);
      outputPreview.innerHTML = htmlText;
      outputHtml.innerText = htmlText;
      outputAst.innerText = astText;
      mhl.highlight();
      mam.setTextMarkdown(text);
      mam.setTextHtml(outputPreview.innerHTML);
      mam.resolveImageSources(outputPreview);
    }

    let isFirstFocus = true;
    editor.addEventListener("focus", () => {
      if (isFirstFocus) {
        isFirstFocus = false;
        editor.value = "";
        outputPreview.innerHTML = "";
        outputHtml.innerText = "";
        outputAst.innerText = "";
        mam.setTextMarkdown("");
        mam.setTextHtml("");
        return;
      }
    });

    function debounce(fn, delay) {
      let timer = null;
      return function (...args) {
        clearTimeout(timer);
        timer = setTimeout(() => {
          fn.apply(this, args);
        }, delay);
      };
    }

    editor.addEventListener("input", debounce((e) => {
      const text = e.target.value;
      const ast = mmd.parse(text);
      const html = mmd.render(ast);
      outputPreview.innerHTML = html;
      outputHtml.innerText = html;
      outputAst.innerText = ast.dumpString();
      mhl.highlight();
      mam.setTextMarkdown(text);
      mam.setTextHtml(outputPreview.innerHTML);
      mam.resolveImageSources(outputPreview);
    }, 200));

    init();
  </script>
  <!-- Editor Tabs -->
  <script>
    const editorTabButtons = document.querySelectorAll(".editor .tab-button");
    const editorTabPanels = document.querySelectorAll(".editor .tab-panel");
    const defaultEditorTab = "editor-tab1";
    openEditorTab(defaultEditorTab);
    function openEditorTab(tabName) {
      editorTabButtons.forEach(elem => elem.classList.remove("on"));
      editorTabPanels.forEach(elem => elem.classList.remove("on"));
      document.getElementById(tabName).classList.add('on');
      document
        .querySelector('.editor .tab-button[data-tab="' + tabName + '"]')
        .classList.add('on');
    }
    editorTabButtons.forEach(elem => {
      elem.addEventListener("click", () => {
        openEditorTab(elem.dataset.tab);
      });
    });
  </script>
  <!-- Output Tabs -->
  <script>
    const outputTabButtons = document.querySelectorAll(".output .tab-button");
    const outputTabPanels = document.querySelectorAll(".output .tab-panel");
    const defaultOutputTab = "output-tab1";
    openOutputTab(defaultOutputTab);
    function openOutputTab(tabName) {
      outputTabButtons.forEach(elem => elem.classList.remove("on"));
      outputTabPanels.forEach(elem => elem.classList.remove("on"));
      document.getElementById(tabName).classList.add('on');
      document
        .querySelector('.output .tab-button[data-tab="' + tabName + '"]')
        .classList.add('on');
    }
    outputTabButtons.forEach(elem => {
      elem.addEventListener("click", () => {
        openOutputTab(elem.dataset.tab);
      });
    });
  </script>

</body>

</html>
