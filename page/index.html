<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/assets/css/layout.css" />
  <link rel="stylesheet" href="/assets/css/markdown.css" />
  <title>Mini Markdown Editor</title>
</head>

<body>
  <h1>Mini Markdown Editor</h1>
  <div class="view">
    <div class="view__left">
      <p>Input [Markdown Text]</p>
      <textarea id="editor" wrap="off"></textarea>
      <p>Parser [Text -> Abstract Syntax Tree]</p>
      <textarea id="parser" wrap="off"></textarea>
      <p>Render [Abstract Syntax Tree -> HTML]</p>
      <textarea id="render" wrap="off"></textarea>
    </div>
    <div class="view__right">
      <p>Output</p>
      <div class="output">
        <div id="output" class="markdown-body"></div>
      </div>
    </div>
  </div>
</body>

<script type="module">
  import MiniMarkdown from "/assets/js/mini-markdown.js";
  const markdown = new MiniMarkdown();

  async function readFile(path) {
    const res = await fetch(path);
    const text = await res.text();
    console.log(text);
    return text;
  }
  async function init() {
    var text = await readFile("/assets/input.md");

    const editor = document.getElementById("editor");
    const parser = document.getElementById("parser");
    const render = document.getElementById("render");
    const output = document.getElementById("output");

    editor.value = text;
    const ast = markdown.parse(text);
    parser.value = ast.dumpString();
    const html = markdown.render(ast);
    render.value = html;
    output.innerHTML = html;
  }

  const editor = document.getElementById("editor");
  const parser = document.getElementById("parser");
  const render = document.getElementById("render");
  const output = document.getElementById("output");

  function debounce(fn, delay) {
    let timer = null;
    return function (...args) {
      clearTimeout(timer);
      timer = setTimeout(() => {
        fn.apply(this, args);
      }, delay);
    };
  }

  editor.addEventListener("input", debounce((e) => {
    const text = e.target.value;
    const ast = markdown.parse(text);
    parser.value = ast.dumpString();
    const html = markdown.render(ast);
    render.value = html;
    output.innerHTML = html;
  }, 200));

  init();
</script>
