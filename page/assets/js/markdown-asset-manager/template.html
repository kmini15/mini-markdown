<div class="markdown-asset-manager">
  <div class="section">
    <div class="header">
      <p>Markdown Asset Manager</p>
    </div>
    <div class="main">
      <input type="file" id="imageInput" multiple accept="image/*" style="display: none;" />
      <div class="menu">
        <button id="uploadButton">Upload Images</button>
        <button id="downloadButton">Download ZIP</button>
      </div>
      <div id="uploadedFiles" class="image-list">

        <div class="image-item">
          <img class="image-preview" src="assets/test.jpg" alt="" />
          <div class="file-list">
            <div class="variants">
              <div class="file-item"><button data-variant="320">320px</button></div>
              <div class="file-item"><button data-variant="640">640px</button></div>
              <div class="file-item"><button data-variant="960">960px</button></div>
              <div class="file-item"><button data-variant="1280">1280px</button></div>
            </div>
            <div class="source">
              <div class="file-item"><button data-variant="source">Source</button></div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
